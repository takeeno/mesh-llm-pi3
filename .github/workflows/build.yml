name: Pi3 Auto Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone original mesh-llm
        run: git clone https://github.com/michaelneale/mesh-llm.git .

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install Cross-Linker
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Prepare Dummy UI
        run: |
          mkdir -p mesh-llm/ui/dist
          echo "<html><body>Mesh-LLM Core Only</body></html>" > mesh-llm/ui/dist/index.html

      - name: Build for ARM64
        working-directory: mesh-llm
        # OPENSSL_STATIC=1 と OPENSSL_NO_VENDOR=0 を指定して
        # OpenSSLが必要な場合も自動でビルドに組み込ませます
        run: cargo build --release --target aarch64-unknown-linux-gnu
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          OPENSSL_DIR: /usr/lib/aarch64-linux-gnu
          OPENSSL_STATIC: "1"
          # 以下の設定が重要：OpenSSLをソースからビルドしてバイナリに埋め込みます
          OPENSSL_NO_VENDOR: "0"

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: mesh-llm-binary
          path: target/aarch64-unknown-linux-gnu/release/mesh-llm
