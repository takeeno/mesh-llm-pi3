name: Pi3 Auto Build (Final Decisive)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone original mesh-llm
        run: git clone https://github.com/michaelneale/mesh-llm.git .

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu perl make

      - name: Prepare Dummy UI
        run: |
          mkdir -p mesh-llm/ui/dist
          echo "<html><body>Mesh-LLM Core Only</body></html>" > mesh-llm/ui/dist/index.html

      - name: Force OpenSSL Vendored via Cargo.toml
        working-directory: mesh-llm
        run: |
          # 依存関係にある openssl-sys に 'vendored' フラグを強制的に注入します。
          # これにより、pkg-config を見に行く動作そのものを封じ込めます。
          cargo add openssl --features vendored
          cargo update

      - name: Build for ARM64
        working-directory: mesh-llm
        run: |
          export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          # 環境変数でも念押しして、ソースからのコンパイルを強制します
          export OPENSSL_NO_VENDOR=0
          export OPENSSL_STATIC=1
          cargo build --release --target aarch64-unknown-linux-gnu

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: mesh-llm-binary
          path: target/aarch64-unknown-linux-gnu/release/mesh-llm
