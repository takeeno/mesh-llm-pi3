name: Pi3 Auto Build (True Final)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone original mesh-llm
        run: git clone https://github.com/michaelneale/mesh-llm.git .

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install Cross Tool
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Prepare Dummy UI
        run: |
          mkdir -p mesh-llm/ui/dist
          echo "<html><body>Mesh-LLM Core Only</body></html>" > mesh-llm/ui/dist/index.html

      - name: Configure Cross (Force OpenSSL Setup)
        working-directory: mesh-llm
        run: |
          # Cross.tomlを作成し、OpenSSLが同梱されたイメージを指定します
          cat <<EOF > Cross.toml
          [target.aarch64-unknown-linux-gnu]
          image = "ghcr.io/cross-rs/aarch64-unknown-linux-gnu:edge"
          pre-build = ["apt-get update && apt-get install -y libssl-dev:arm64 pkg-config:arm64"]
          EOF

      - name: Build for ARM64 using Cross
        working-directory: mesh-llm
        # 内部でOpenSSLをビルドするように強制します
        run: cross build --release --target aarch64-unknown-linux-gnu
        env:
          OPENSSL_NO_VENDOR: "0"

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: mesh-llm-binary
          path: target/aarch64-unknown-linux-gnu/release/mesh-llm
